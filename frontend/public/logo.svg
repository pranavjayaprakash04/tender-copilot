    <line x1="-15" y1="-18" x2="3" y2="-18" stroke="#4F8EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-15" y1="-10" x2="3" y2="-10" stroke="#4F8EFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-15" y1="-2" x2="-3" y2="-2" stroke="#4F8EFF" stroke-width="1.5" stroke-linecap="round"/>
