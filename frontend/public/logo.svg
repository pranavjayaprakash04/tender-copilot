    <circle cx="62" cy="36" r="3" fill="#1E5EFF"/>
    <circle cx="0" cy="72" r="3" fill="#1E5EFF"/>
    <circle cx="-62" cy="36" r="3" fill="#1E5EFF"/>
    <circle cx="-62" cy="-36" r="3" fill="#00C6B3"/>
